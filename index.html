<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>電池と豆電球シミュレーター</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-02" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="電池と豆電球シミュレーター">
        <header class="topbar">
          <div>
            <p class="eyebrow">中学受験の理科</p>
            <h1>電池と豆電球シミュレーター</h1>
          </div>
          <div class="baseline">
            <strong>基準</strong>
            <span>電池1個 + 豆電球1個の電流 = 1</span>
          </div>
        </header>

        <div class="layout">
          <aside class="parts-panel" aria-label="部品と操作">
            <h2>組み立て</h2>
            <button class="part" data-part="battery" type="button">
              <span class="battery-icon" aria-hidden="true"></span>
              <span>
                <strong>電池</strong>
                <small>回路へドラッグ</small>
              </span>
            </button>
            <button class="part" data-part="bulb" type="button">
              <span class="bulb-icon lit" aria-hidden="true"></span>
              <span>
                <strong>豆電球</strong>
                <small>回路へドラッグ</small>
              </span>
            </button>
            <button class="part" data-part="ammeter" type="button">
              <span class="ammeter-icon" aria-hidden="true">A</span>
              <span>
                <strong>電流計</strong>
                <small>枝に入れて測る</small>
              </span>
            </button>
            <button class="part" data-part="wire" type="button">
              <span class="wire-icon" aria-hidden="true"></span>
              <span>
                <strong>導線</strong>
                <small>ショートも再現</small>
              </span>
            </button>

            <div class="mini-controls">
              <button id="resetButton" class="ghost-button" type="button">リセット</button>
            </div>

            <div class="template-panel" aria-label="テンプレート">
              <h3>テンプレート</h3>
              <div class="preset-grid">
                <button class="preset-button compact" data-preset="fig398-1" type="button">基本の1こ回路</button>
                <button class="preset-button compact" data-preset="fig398-2" type="button">直列どうし</button>
                <button class="preset-button compact" data-preset="fig398-3" type="button">豆電球の並列</button>
                <button class="preset-button compact" data-preset="fig398-4" type="button">電池の並列</button>
                <button class="preset-button compact" data-preset="fig398-5" type="button">電池と豆の並列</button>
                <button class="preset-button compact" data-preset="fig400" type="button">枝の長さ比べ</button>
                <button class="preset-button compact" data-preset="fig402-2" type="button">導線ショート</button>
                <button class="preset-button compact" data-preset="fig402-4" type="button">複雑な並列枝</button>
              </div>
            </div>
          </aside>

          <section class="circuit-panel">
            <div class="drop-zone" id="dropZone" tabindex="0" aria-label="回路を組む場所">
              <div class="circuit-board">
                <svg id="schematic" class="schematic" role="img" aria-label="回路図" viewBox="0 0 980 560"></svg>
              </div>
            </div>
          </section>

          <aside class="results-panel" aria-label="結果">
            <h2>結果</h2>
            <div class="meters">
              <div class="meter">
                <span>全体の電流</span>
                <strong id="currentValue">0</strong>
                <small>倍</small>
                <div class="bar"><i id="currentBar"></i></div>
              </div>
            </div>

            <div class="readout">
              <h3>回路の状態</h3>
              <div id="structureSummary" class="detail-list compact-list"></div>
            </div>

            <div class="explain" id="explainBox"></div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260607-03"></script>
  </body>
</html>
